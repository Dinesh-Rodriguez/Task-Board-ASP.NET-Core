<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Board – API Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f1117;
      --surface: #1a1d27;
      --card:    #21253a;
      --border:  #2e3352;
      --accent:  #6c8ef7;
      --accent2: #4ade80;
      --danger:  #f87171;
      --warn:    #fbbf24;
      --text:    #e2e8f0;
      --muted:   #8892a4;
      --radius:  8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 { font-size: 18px; font-weight: 700; }
    header .tag { background: var(--accent); color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 999px; font-weight: 600; }

    .config-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 24px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .config-bar label { font-size: 12px; color: var(--muted); display: flex; flex-direction: column; gap: 3px; }
    .config-bar input, .config-bar select {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 5px 10px;
      border-radius: var(--radius);
      font-size: 13px;
      min-width: 220px;
    }
    .config-bar input[type="number"] { min-width: 80px; }
    .config-bar button {
      align-self: flex-end;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 7px 18px;
      border-radius: var(--radius);
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
    }
    .config-bar button:hover { opacity: 0.85; }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      height: calc(100vh - 97px);
    }

    .panel {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel:last-child { border-right: none; }

    .panel-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .panel-header h2 { font-size: 15px; font-weight: 600; }
    .panel-header .actions { display: flex; gap: 8px; }

    .btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 5px 12px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 12px;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn.primary:hover { opacity: 0.85; }
    .btn.danger { color: var(--danger); }
    .btn.danger:hover { border-color: var(--danger); }

    .panel-body { overflow-y: auto; flex: 1; padding: 12px; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .card:hover { border-color: var(--accent); }
    .card.selected { border-color: var(--accent); }
    .card-title { font-weight: 600; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
    .card-meta { font-size: 12px; color: var(--muted); display: flex; gap: 10px; flex-wrap: wrap; }

    .badge {
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 999px;
      font-weight: 600;
    }
    .badge-todo       { background: #374151; color: #d1d5db; }
    .badge-inprogress { background: #1e3a5f; color: #93c5fd; }
    .badge-inreview   { background: #3b2f5e; color: #c4b5fd; }
    .badge-done       { background: #14532d; color: #86efac; }
    .badge-cancelled  { background: #3b1f1f; color: #fca5a5; }
    .badge-low        { background: #1f2937; color: #9ca3af; }
    .badge-medium     { background: #1e3a2e; color: #6ee7b7; }
    .badge-high       { background: #3b2f0e; color: #fcd34d; }
    .badge-critical   { background: #3b1a1a; color: #f87171; }
    .badge-admin      { background: #1e3a5f; color: #93c5fd; }
    .badge-member     { background: #1f2937; color: #9ca3af; }
    .badge-archived   { background: #1f2937; color: #6b7280; border: 1px dashed #374151; }

    .form-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .form-overlay.open { display: flex; }
    .form-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      width: 420px;
      max-width: 95vw;
    }
    .form-box h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 10px;
      border-radius: var(--radius);
      font-size: 13px;
      font-family: inherit;
    }
    .form-group textarea { resize: vertical; min-height: 70px; }
    .form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }

    .log-area {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 8px 16px;
      font-size: 11px;
      font-family: 'Cascadia Mono', 'Fira Code', monospace;
      color: var(--muted);
      max-height: 120px;
      overflow-y: auto;
      flex-shrink: 0;
    }
    .log-area .log-ok { color: var(--accent2); }
    .log-area .log-err { color: var(--danger); }
    .log-area .log-info { color: var(--accent); }

    .empty { text-align: center; color: var(--muted); padding: 40px 0; font-size: 13px; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .detail-row { margin-bottom: 6px; font-size: 13px; }
    .detail-row span { color: var(--muted); min-width: 90px; display: inline-block; }

    @media (max-width: 700px) {
      .layout { grid-template-columns: 1fr; height: auto; }
      .panel { max-height: 50vh; }
    }
  </style>
</head>
<body>

<header>
  <h1>Task Board</h1>
  <span class="tag">API Dashboard</span>
</header>

<div class="config-bar">
  <label>
    Base URL
    <input id="baseUrl" type="text" value="http://localhost:8080" />
  </label>
  <label>
    X-User-Id
    <input id="userId" type="number" value="1" min="1" />
  </label>
  <label>
    X-User-Role
    <select id="userRole">
      <option value="Admin">Admin</option>
      <option value="Member">Member</option>
    </select>
  </label>
  <button onclick="loadAll()">Refresh</button>
</div>

<div class="layout">
  <!-- Projects Panel -->
  <div class="panel">
    <div class="panel-header">
      <h2>Projects</h2>
      <div class="actions">
        <button class="btn primary" onclick="openCreateProject()">+ New</button>
        <button class="btn" onclick="loadProjects()">↺</button>
      </div>
    </div>
    <div class="panel-body" id="projectList"><div class="empty">Click Refresh to load</div></div>
    <div class="log-area" id="projectLog"></div>
  </div>

  <!-- Tasks Panel -->
  <div class="panel">
    <div class="panel-header">
      <h2>Tasks <span id="taskPanelSub" style="font-size:12px;color:var(--muted);font-weight:400;"></span></h2>
      <div class="actions">
        <button class="btn primary" id="btnNewTask" onclick="openCreateTask()" style="display:none">+ New Task</button>
        <select class="btn" id="statusFilter" onchange="loadTasks()" style="padding:4px 8px;">
          <option value="">All Statuses</option>
          <option value="0">Todo</option>
          <option value="1">In Progress</option>
          <option value="2">In Review</option>
          <option value="3">Done</option>
          <option value="4">Cancelled</option>
        </select>
        <button class="btn" onclick="loadTasks()">↺</button>
      </div>
    </div>
    <div class="panel-body" id="taskList"><div class="empty">Select a project</div></div>
    <div class="log-area" id="taskLog"></div>
  </div>
</div>

<!-- Create Project Modal -->
<div class="form-overlay" id="cpModal">
  <div class="form-box">
    <h3>New Project</h3>
    <div class="form-group"><label>Name *</label><input id="cp_name" /></div>
    <div class="form-group"><label>Description</label><textarea id="cp_desc"></textarea></div>
    <div class="form-actions">
      <button class="btn" onclick="closeModal('cpModal')">Cancel</button>
      <button class="btn primary" onclick="createProject()">Create</button>
    </div>
  </div>
</div>

<!-- Create Task Modal -->
<div class="form-overlay" id="ctModal">
  <div class="form-box">
    <h3>New Task</h3>
    <div class="form-group"><label>Title *</label><input id="ct_title" /></div>
    <div class="form-group"><label>Description</label><textarea id="ct_desc"></textarea></div>
    <div class="form-group"><label>Assignee ID</label><input id="ct_assignee" type="number" placeholder="optional" /></div>
    <div class="form-group">
      <label>Priority</label>
      <select id="ct_priority">
        <option value="0">Low</option>
        <option value="1" selected>Medium</option>
        <option value="2">High</option>
        <option value="3">Critical</option>
      </select>
    </div>
    <div class="form-group"><label>Due Date</label><input id="ct_due" type="date" /></div>
    <div class="form-actions">
      <button class="btn" onclick="closeModal('ctModal')">Cancel</button>
      <button class="btn primary" onclick="createTask()">Create</button>
    </div>
  </div>
</div>

<!-- Update Status Modal -->
<div class="form-overlay" id="usModal">
  <div class="form-box">
    <h3>Update Task Status</h3>
    <div id="us_taskName" style="margin-bottom:14px;color:var(--muted);font-size:13px;"></div>
    <div class="form-group">
      <label>New Status</label>
      <select id="us_status"></select>
    </div>
    <div class="form-actions">
      <button class="btn" onclick="closeModal('usModal')">Cancel</button>
      <button class="btn primary" onclick="submitUpdateStatus()">Update</button>
    </div>
  </div>
</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let selectedProjectId = null;
let selectedTaskId = null;
const STATUS_NAMES = ['Todo', 'InProgress', 'InReview', 'Done', 'Cancelled'];
const STATUS_BADGE = ['todo', 'inprogress', 'inreview', 'done', 'cancelled'];
const PRIORITY_NAMES = ['Low', 'Medium', 'High', 'Critical'];
const PRIORITY_BADGE = ['low', 'medium', 'high', 'critical'];
// Allowed transitions (mirroring server-side rules)
const TRANSITIONS = {
  0: [1, 4],        // Todo → InProgress, Cancelled
  1: [0, 2, 4],     // InProgress → Todo, InReview, Cancelled
  2: [1, 3, 4],     // InReview → InProgress, Done, Cancelled
  3: [1],           // Done → InProgress
  4: [0],           // Cancelled → Todo
};

// ─── HTTP helpers ─────────────────────────────────────────────────────────────
function base()   { return document.getElementById('baseUrl').value.replace(/\/$/, ''); }
function uid()    { return document.getElementById('userId').value; }
function urole()  { return document.getElementById('userRole').value; }

function headers(extra = {}) {
  return {
    'Content-Type': 'application/json',
    'X-User-Id':   uid(),
    'X-User-Role': urole(),
    ...extra
  };
}

async function apiFetch(path, opts = {}) {
  const url = base() + path;
  const res = await fetch(url, { ...opts, headers: headers(opts.headers || {}) });
  const ct = res.headers.get('content-type') || '';
  const body = ct.includes('json') ? await res.json() : await res.text();
  return { ok: res.ok, status: res.status, body };
}

// ─── Logging ──────────────────────────────────────────────────────────────────
function log(panelId, msg, type = 'info') {
  const el = document.getElementById(panelId);
  const line = document.createElement('div');
  line.className = 'log-' + type;
  line.textContent = new Date().toLocaleTimeString() + '  ' + msg;
  el.prepend(line);
  while (el.children.length > 30) el.lastChild.remove();
}

// ─── Projects ─────────────────────────────────────────────────────────────────
async function loadProjects() {
  const el = document.getElementById('projectList');
  el.innerHTML = '<div class="empty"><div class="spinner"></div></div>';
  const { ok, body } = await apiFetch(`/api/projects?userId=${uid()}`);
  if (!ok) { el.innerHTML = `<div class="empty">${body?.detail || 'Error loading projects'}</div>`; log('projectLog', body?.detail || 'fetch error', 'err'); return; }
  log('projectLog', `Loaded ${body.length} project(s)`, 'ok');
  if (body.length === 0) { el.innerHTML = '<div class="empty">No projects found for this user</div>'; return; }
  el.innerHTML = '';
  body.forEach(p => {
    const div = document.createElement('div');
    div.className = 'card' + (p.id === selectedProjectId ? ' selected' : '');
    div.onclick = () => selectProject(p.id, p.name);
    div.innerHTML = `
      <div class="card-title">
        ${esc(p.name)}
        ${p.isArchived ? '<span class="badge badge-archived">Archived</span>' : ''}
      </div>
      <div class="card-meta">
        <span>ID: ${p.id}</span>
        <span>${p.taskCount} task${p.taskCount !== 1 ? 's' : ''}</span>
        <span>${p.memberCount} member${p.memberCount !== 1 ? 's' : ''}</span>
        <span>Owner: ${p.ownerId}</span>
      </div>
      ${p.description ? `<div style="margin-top:6px;font-size:12px;color:var(--muted)">${esc(p.description)}</div>` : ''}
    `;
    el.appendChild(div);
  });
}

function selectProject(id, name) {
  selectedProjectId = id;
  document.getElementById('taskPanelSub').textContent = `— ${name}`;
  document.getElementById('btnNewTask').style.display = '';
  // Update selected card styling
  document.querySelectorAll('#projectList .card').forEach(c => c.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  loadTasks();
}

async function createProject() {
  const name = document.getElementById('cp_name').value.trim();
  const desc = document.getElementById('cp_desc').value.trim();
  if (!name) { alert('Name is required'); return; }
  const { ok, body } = await apiFetch(`/api/projects?ownerId=${uid()}`, {
    method: 'POST',
    body: JSON.stringify({ name, description: desc })
  });
  if (!ok) { log('projectLog', body?.detail || 'Create failed', 'err'); return; }
  log('projectLog', `Created project "${body.name}" (id ${body.id})`, 'ok');
  closeModal('cpModal');
  document.getElementById('cp_name').value = '';
  document.getElementById('cp_desc').value = '';
  loadProjects();
}

// ─── Tasks ────────────────────────────────────────────────────────────────────
async function loadTasks() {
  if (!selectedProjectId) return;
  const el = document.getElementById('taskList');
  el.innerHTML = '<div class="empty"><div class="spinner"></div></div>';
  const statusFilter = document.getElementById('statusFilter').value;
  let qs = `?projectId=${selectedProjectId}`;
  if (statusFilter !== '') qs += `&status=${statusFilter}`;
  const { ok, body } = await apiFetch(`/api/tasks${qs}`);
  if (!ok) { el.innerHTML = `<div class="empty">${body?.detail || 'Error'}</div>`; log('taskLog', body?.detail || 'fetch error', 'err'); return; }
  const items = Array.isArray(body) ? body : (body.items || []);
  log('taskLog', `Loaded ${items.length} task(s) for project ${selectedProjectId}`, 'ok');
  if (items.length === 0) { el.innerHTML = '<div class="empty">No tasks found</div>'; return; }
  el.innerHTML = '';
  items.forEach(t => {
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `
      <div class="card-title">
        ${esc(t.title)}
        <span class="badge badge-${STATUS_BADGE[t.status]}">${STATUS_NAMES[t.status]}</span>
        <span class="badge badge-${PRIORITY_BADGE[t.priority]}">${PRIORITY_NAMES[t.priority]}</span>
      </div>
      <div class="card-meta">
        <span>ID: ${t.id}</span>
        ${t.assigneeId ? `<span>Assignee: ${t.assigneeId}</span>` : ''}
        ${t.dueDate ? `<span>Due: ${t.dueDate.slice(0,10)}</span>` : ''}
      </div>
      <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;">
        <button class="btn" onclick="openUpdateStatus(${t.id}, ${t.status}, '${esc(t.title)}', event)">Status →</button>
        <button class="btn danger" onclick="archiveTask(${t.id}, event)">Archive</button>
      </div>
    `;
    el.appendChild(div);
  });
}

async function createTask() {
  const title    = document.getElementById('ct_title').value.trim();
  const desc     = document.getElementById('ct_desc').value.trim();
  const assignee = document.getElementById('ct_assignee').value;
  const priority = parseInt(document.getElementById('ct_priority').value);
  const due      = document.getElementById('ct_due').value;
  if (!title) { alert('Title is required'); return; }
  const payload = { title, projectId: selectedProjectId, priority };
  if (desc)     payload.description = desc;
  if (assignee) payload.assigneeId  = parseInt(assignee);
  if (due)      payload.dueDate     = due;
  const { ok, body } = await apiFetch('/api/tasks', { method: 'POST', body: JSON.stringify(payload) });
  if (!ok) { log('taskLog', body?.detail || 'Create failed', 'err'); return; }
  log('taskLog', `Created task "${body.title}" (id ${body.id})`, 'ok');
  closeModal('ctModal');
  document.getElementById('ct_title').value = '';
  document.getElementById('ct_desc').value  = '';
  document.getElementById('ct_assignee').value = '';
  document.getElementById('ct_due').value   = '';
  loadTasks();
}

function openUpdateStatus(taskId, currentStatus, title, evt) {
  evt.stopPropagation();
  selectedTaskId = taskId;
  document.getElementById('us_taskName').textContent = `Task: ${title}`;
  const sel = document.getElementById('us_status');
  sel.innerHTML = '';
  (TRANSITIONS[currentStatus] || []).forEach(s => {
    const opt = document.createElement('option');
    opt.value = s;
    opt.textContent = STATUS_NAMES[s];
    sel.appendChild(opt);
  });
  if (sel.options.length === 0) {
    sel.innerHTML = '<option disabled>No transitions available</option>';
  }
  openModal('usModal');
}

async function submitUpdateStatus() {
  const newStatus = parseInt(document.getElementById('us_status').value);
  const { ok, body } = await apiFetch(`/api/tasks/${selectedTaskId}/status`, {
    method: 'PATCH',
    body: JSON.stringify({ status: newStatus })
  });
  if (!ok) { log('taskLog', body?.detail || 'Status update failed', 'err'); return; }
  log('taskLog', `Task ${selectedTaskId} → ${STATUS_NAMES[newStatus]}`, 'ok');
  closeModal('usModal');
  loadTasks();
}

async function archiveTask(taskId, evt) {
  evt.stopPropagation();
  if (!confirm(`Archive task ${taskId}?`)) return;
  const { ok, body } = await apiFetch(`/api/tasks/${taskId}/archive`, { method: 'PATCH' });
  if (!ok) { log('taskLog', body?.detail || 'Archive failed', 'err'); return; }
  log('taskLog', `Task ${taskId} archived`, 'ok');
  loadTasks();
}

// ─── Modal helpers ────────────────────────────────────────────────────────────
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function openCreateProject() { openModal('cpModal'); }
function openCreateTask() {
  if (!selectedProjectId) { alert('Select a project first'); return; }
  openModal('ctModal');
}

// Close modal on backdrop click
document.querySelectorAll('.form-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

// ─── Utilities ────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function loadAll() { await loadProjects(); if (selectedProjectId) loadTasks(); }

// Auto-load on start
window.addEventListener('DOMContentLoaded', loadAll);
</script>
</body>
</html>
